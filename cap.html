<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Капітан Америка</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
        }

        body {
            text-align: center;
            font-family: Arial, sans-serif;
            color: white;
            background: #1a1f3a;
            background: linear-gradient(180deg, 
                #1a1f3a 0%, 33.3%, 
                #2d3a6d 33.3%, 66.6%, 
                #0d111a 66.6%, 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        h1 {
            font-size: 48px;
            color: #ff3b3b;
            margin: 0 0 20px 0;
        }

        img {
            width: 250px;
            border-radius: 15px;
            border: 4px solid white;
            margin-bottom: 20px;
            transition: transform 0.3s ease;
        }

        img:hover {
            transform: scale(1.1);
        }

        p {
            max-width: 500px;
            font-size: 18px;
            line-height: 1.6;
            margin: 0 0 30px 0;
        }

        .btn {
            display: inline-block;
            color: #ff3b3b;
            text-decoration: none;
            border: 2px solid #ff3b3b;
            padding: 12px 30px;
            border-radius: 12px;
            font-weight: bold;
            transition: 0.3s;
        }

        .btn:hover {
            background: #ff3b3b;
            color: white;
            transform: scale(1.1);
            box-shadow: none;
        }
    </style>
</head>
<body>

    <h1>Капітан Америка</h1>

    <img src="3.png" alt="Капітан Америка">

    <p>
        Капітан Америка — суперсолдат Стів Роджерс. <br>
        Він символ справедливості та має щит із вібранію.
    </p>

    <a href="index (1).html" class="btn">⬅ Назад</a>

</body>
</html>
