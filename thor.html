<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<title>Тор</title>

<style>
body {
    text-align: center;
    font-family: Arial, sans-serif;
    background: linear-gradient(180deg, #111, #1f2a44);
    color: white;
    margin: 0;
    padding: 20px;
}

h1 {
    font-size: 40px;
    text-shadow: 0 0 10px #00aaff;
}

img {
    width: 250px;
    border-radius: 15px;
    margin: 20px 0;
    transition: transform 0.3s;
}

img:hover {
    transform: scale(1.1);
}

p {
    max-width: 500px;
    margin: auto;
    font-size: 18px;
}

a {
    display: inline-block;
    margin-top: 30px;
    color: #00aaff;
    text-decoration: none;
    border: 1px solid #00aaff;
    padding: 10px 20px;
    border-radius: 10px;
    transition: 0.2s;
}

a:hover {
    background: #00aaff;
    color: black;
    transform: scale(1.1);
}
</style>
</head>

<body>

<h1>Тор ⚡</h1>

<img src="1.png">

<p>
Тор — бог грому з Асгарду. Один із найсильніших героїв.
Він володіє молотом Мйольніром та захищає Землю.
</p>

<a href="index.html">⬅ Назад</a>

</body>
</html>
