<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<title>Грут</title>

<style>
body {
    text-align: center;
    font-family: Arial, sans-serif;
    background: linear-gradient(120deg, #0a0f0a, #142b14, #1b3d1b);
    color: white;
    margin: 0;
    padding: 50px 20px;
    min-height: 100vh;
}

h1 {
    font-size: 40px;
    color: #00ff88;
    margin-bottom: 30px;
}

img {
    width: 250px;
    border-radius: 15px;
    border: 4px solid #5d3a1a;
    transition: all 0.4s ease-in-out;
}

img:hover {
    transform: scale(1.1);
    border-color: #8b4513;
    box-shadow: 0 0 30px rgba(0, 255, 136, 0.4);
}

p {
    max-width: 500px;
    margin: 30px auto;
    font-size: 18px;
    line-height: 1.6;
}

a {
    display: inline-block;
    color: #00ff88;
    text-decoration: none;
    border: 2px solid #00ff88;
    padding: 12px 25px;
    border-radius: 12px;
    font-weight: bold;
    transition: all 0.3s cubic-bezier(0.68, -0.55, 0.27, 1.55);
}

a:hover {
    background: #00ff88;
    color: black;
    transform: scale(1.15) translateY(-5px);
    box-shadow: none; 
}
</style>
</head>

<body>

<h1>Грут</h1>

<img src="2.png" alt="Я є Грут">

<p>
Грут — деревоподібний гуманоїд. <br>
Він може відновлюватися та контролювати рослини. <br>
Його фраза: "Я є Грут".
</p>

<a href="index.html">⬅ Назад</a>

</body>
</html>
