<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<title>Наш проєкт</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(120deg, #2c3e50, #4ca1af);
    color: white;
    text-align: center;
}

h1 {
    margin-top: 40px;
    font-size: 40px;
}

nav {
    margin: 30px 0;
}

nav a {
    display: inline-block; 
    color: white;
    margin: 10px;
    text-decoration: none;
    padding: 10px 20px;
    border: 2px solid white;
    border-radius: 10px;
    transition: transform 0.2s, background 0.2s, color 0.2s;
}

nav a:hover {
    background: white;
    color: #2c3e50;
    transform: scale(1.1);
}

/* 🔥 новая кнопка */
.presentation-btn {
    display: inline-block;
    margin-top: 20px;
    padding: 12px 25px;
    background: white;
    color: #2c3e50;
    border-radius: 12px;
    text-decoration: none;
    font-weight: bold;
    transition: 0.3s;
}

.presentation-btn:hover {
    background: #2c3e50;
    color: white;
    transform: scale(1.1);
}

.card {
    margin-top: 40px;
    padding: 25px;
    display: inline-block;
    background: rgba(255,255,255,0.15);
    border-radius: 10px;
    font-size: 18px;
}
</style>
</head>

<body>

<h1>Наш проєкт</h1>

<nav>
    <a href="thor.html">Тор</a>
    <a href="groot.html">Грут</a>
    <a href="cap.html">Капітан Америка</a>
</nav>

<!-- 🔥 кнопка -->
<a href="presentation.html" class="presentation-btn">Переглянути презентацію</a>

<div class="card">
    Оберіть героя або перегляньте презентацію нашого проєкту ↑
</div>

</body>
</html>
